# Goal-mode z generation config for scripts/motion_to_z_onnx.py.
#
# Each clip becomes one entry in the output dict: { name: ndarray[1, 256] }.
# The 21 keys below mirror the legacy model/goal_inference/goal_reaching.pkl
# so the resulting pkl is a drop-in replacement.
#
# motion_root is prepended to relative motion_file paths. Most of the source
# clips live in ../BFM-Zero_inf/data/amass/ (AMASS retarget) -- only the
# ones present locally will be processed; missing files are skipped with a
# warning.

output: model/goal_inference/goal_reaching.pkl
motion_root: ../BFM-Zero_inf

clips:
  # Verified locally (example_motion/) -- safe entry points for testing.
  - { name: dance1_subject2_1150, motion_file: example_motion/dance1_subject2_50_jpos.npz, frame_idx: 1150 }
  - { name: dance1_subject2_2877, motion_file: example_motion/dance1_subject2_50_jpos.npz, frame_idx: 2877 }

  # The clips below depend on additional retargeted motions not bundled with
  # the deploy repo. Adjust motion_file paths to point at the corresponding
  # .npz files in your local BFM-Zero_inf/data tree.
